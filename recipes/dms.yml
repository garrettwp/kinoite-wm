# Install DankMaterialShell
modules:
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
    install:
      install-weak-deps: true
      packages:
        - cava
        #- qt6ct
        - qt6-qtmultimedia
        - repo: coprdep:copr.fedorainfracloud.org:avengemedia:danklinux
          packages:
            - danksearch
            - cliphist
            - matugen
            - dgop
            - quickshell
            - qt6ct-kde
        - repo: copr:copr.fedorainfracloud.org:avengemedia:dms
          packages:
            - dms

